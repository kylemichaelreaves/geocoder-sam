AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  geocoder-sam

  Serverless address geocoding API.

Parameters:
  AuthorizerFunctionArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /dev/resourceQuerier/authorizer/functionArn
    Description: >
      ARN of resourceQuerier's JWT Lambda authorizer, resolved from SSM. The
      geocoder API delegates authentication to it so only callers with a valid
      JWT (issued by resourceQuerier POST /api/v1/login) can invoke /v1/geocode.

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 15
    MemorySize: 256

Resources:
  GeocoderApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          # Delegates authentication to resourceQuerier's JWT Lambda authorizer
          # (shared via SSM). Only callers with a valid Bearer token issued by
          # resourceQuerier (POST /api/v1/login) can invoke the API.
          JwtAuthorizer:
            FunctionArn: !Ref AuthorizerFunctionArn
            Identity:
              Header: Authorization

  GeocoderFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: handler/
      Handler: app.lambda_handler
      Runtime: ruby3.4
      Architectures:
        - x86_64
      Events:
        GeocodeGet:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            RestApiId: !Ref GeocoderApi
            Path: /v1/geocode
            Method: get
        GeocodePost:
          Type: Api
          Properties:
            RestApiId: !Ref GeocoderApi
            Path: /v1/geocode
            Method: post

Outputs:
  GeocoderApiUrl:
    Description: "Invoke URL for the geocoder endpoint"
    Value: !Sub "https://${GeocoderApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/v1/geocode"
  GeocoderFunctionArn:
    Description: "GeocoderFunction ARN"
    Value: !GetAtt GeocoderFunction.Arn
  GeocoderFunctionIamRole:
    Description: "Implicit IAM Role created for GeocoderFunction"
    Value: !GetAtt GeocoderFunctionRole.Arn
