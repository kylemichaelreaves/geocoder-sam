version: 2
updates:
  # Keep GitHub Actions current. Actions in the pipeline are pinned to commit
  # SHAs (SonarQube githubactions:S7637); Dependabot bumps both the SHA and the
  # trailing version comment, so the pins don't silently go stale.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
